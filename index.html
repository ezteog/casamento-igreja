<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patrícia &amp; Caio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root { --ivory:#FBF7F0; --green:#2E4034; --gold:#B89A5E; --soft:#6b6157; }
    * { box-sizing: border-box; }

    /* MOBILE-FIRST: base pensada pro celular */
    body {
      margin:0; background:var(--ivory); color:var(--green);
      font-family:'Inter',sans-serif; font-weight:300; line-height:1.6;
      -webkit-text-size-adjust:100%;
    }
    h1,h2,h3 { font-family:'Cormorant Garamond',serif; font-weight:500; margin:0; }

    .hero {
      min-height:88vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; text-align:center; padding:1.5rem;
    }
    .eyebrow {
      letter-spacing:0.25em; font-size:0.7rem; text-transform:uppercase;
      color:var(--gold); margin-bottom:1.2rem;
    }
    .hero h1 { font-size:2.8rem; line-height:1.1; }
    .amp { color:var(--gold); font-style:italic; }
    .info { margin-top:1.2rem; font-size:0.95rem; letter-spacing:0.03em; }
    .divider { width:50px; height:1px; background:var(--gold); margin:1.2rem auto; }

    section { padding:2.5rem 1.2rem; text-align:center; }
    section h2 { font-size:1.9rem; margin-bottom:0.3rem; }
    .intro { margin:0 auto 2rem; color:var(--soft); font-size:0.95rem; }

    .gifts { display:grid; grid-template-columns:1fr; gap:1.2rem; }
    .gift {
      background:#fff; border:1px solid #ece5d8; border-radius:16px;
      padding:1.6rem 1.2rem; display:flex; flex-direction:column; align-items:center;
    }
    .tag {
      font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase;
      color:var(--gold); margin-bottom:0.5rem;
    }
    .gift h3 { font-size:1.4rem; margin-bottom:0.3rem; }
    .value { color:var(--soft); margin-bottom:1rem; font-size:0.9rem; }

    .btn {
      background:var(--green); color:var(--ivory); border:none; border-radius:999px;
      padding:0.8rem 1.6rem; font-family:'Inter',sans-serif; font-size:0.95rem;
      letter-spacing:0.04em; cursor:pointer; transition:background 0.2s ease;
      width:100%; max-width:280px;
    }
    .btn:active { background:#25332a; }

    .pix-box {
      background:#fff; border:1px solid #ece5d8; border-radius:16px;
      padding:1.6rem; margin:0 auto; max-width:480px;
    }
    .pix-key {
      font-family:monospace; background:var(--ivory); padding:0.8rem;
      border-radius:8px; word-break:break-all; margin:1rem 0; font-size:0.95rem;
    }
    .note { font-size:0.85rem; color:var(--soft); margin-top:1.2rem; }
    footer { text-align:center; padding:2rem 1.2rem; color:var(--soft); font-size:0.8rem; }

    /* TELAS MAIORES: só aqui o layout "cresce" */
    @media (min-width:700px) {
      .hero h1 { font-size:4.5rem; }
      .info { font-size:1rem; }
      section { padding:3rem 1.5rem; max-width:900px; margin:0 auto; }
      section h2 { font-size:2.3rem; }
      .gifts { grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:1.5rem; }
      .btn:hover { background:#25332a; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="eyebrow">Com a bênção de Deus</div>
    <h1>Patrícia <span class="amp">&amp;</span> Caio</h1>
    <div class="divider"></div>
    <div class="info">
      04 de Julho de 2026 &nbsp;•&nbsp; Paróquia Nossa Senhora do Brasil<br>
      Av. Portugal, 772 — Urca, Rio de Janeiro
    </div>
  </div>

  <section>
    <h2>Bem-vindos</h2>
    <div class="divider"></div>
    <p class="intro">
      É com muita
